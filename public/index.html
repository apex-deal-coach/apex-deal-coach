<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Apex</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ================= HOME ================= -->
<div class="screen active" id="screen-home">
  <div class="home-top">
    <div class="greeting" id="greeting">Good morning</div>
    <div class="greeting-sub">Ready when you are.</div>
  </div>

  <button class="big-btn primary" onclick="goLiveNew()">+ New Customer</button>

  <div class="continue-card" id="continue-card" style="display:none" onclick="goLiveContinue()">
    <div class="continue-label">Continue last customer</div>
    <div class="continue-name" id="continue-name">—</div>
    <div class="continue-sub" id="continue-sub">—</div>
  </div>

  <div class="progress-card">
    <div class="progress-label">Today's progress</div>
    <div class="progress-row">
      <div class="progress-stat"><div class="progress-num" id="home-deals">0</div><div class="progress-lbl">Deals saved</div></div>
      <div class="progress-stat"><div class="progress-num" id="home-customers">0</div><div class="progress-lbl">Customers</div></div>
    </div>
  </div>
</div>

<!-- ================= LIVE ================= -->
<div class="screen" id="screen-live">

  <div class="live-header">
    <button class="icon-btn" onclick="goHome()">&#8592;</button>
    <div class="live-title" id="live-title">New customer</div>
    <div style="width:36px"></div>
  </div>

  <div class="f"><label>Customer name</label><input type="text" id="live-name" placeholder="e.g. Mr Tan" oninput="liveSaveDraft()"></div>
  <div class="f"><label>Interested car</label><input type="text" id="live-car" placeholder="e.g. Toyota Camry" oninput="liveSaveDraft()"></div>

  <div class="f">
    <div class="f-label-row"><label>Notes</label><button class="clear-notes-btn" onclick="clearNotesOnly()">Clear Notes</button></div>
    <textarea id="live-notes" placeholder="Type what the customer says, as you talk..." oninput="liveSaveDraft()"></textarea>
  </div>

  <button class="big-btn primary" id="live-update-btn" onclick="liveUpdate()">Analyze Conversation</button>

  <div id="live-advice" style="display:none">

    <div class="advice-card highlight">
      <div class="advice-label">Ask this next</div>
      <div class="advice-text" id="advice-question">—</div>
      <button class="coach-me-btn" onclick="openCoachMe('question')">Why this question</button>
    </div>

    <button class="more-toggle" id="more-toggle" onclick="toggleMoreAdvice()">
      <span>More guidance</span><span class="more-toggle-arrow">&#9662;</span>
    </button>

    <div id="more-advice" style="display:none">
      <div class="advice-row">
        <div class="advice-row-top"><div class="advice-row-lbl">Say</div><button class="coach-me-btn small" onclick="openCoachMe('say')">Coach me</button></div>
        <div class="advice-row-txt" id="advice-say">—</div>
      </div>
      <div class="advice-row warn">
        <div class="advice-row-top"><div class="advice-row-lbl">Avoid</div><button class="coach-me-btn small" onclick="openCoachMe('warn')">Coach me</button></div>
        <div
